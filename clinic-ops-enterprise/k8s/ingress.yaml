apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clinic-ops-ingress
  namespace: clinic-ops
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/rate-limit: "1000"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.clinic-ops.ai
    - www.clinic-ops.ai
    secretName: clinic-ops-tls
  rules:
  - host: api.clinic-ops.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: clinic-ops-api
            port:
              number: 80
  - host: www.clinic-ops.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: clinic-ops-api
            port:
              number: 80
