apiVersion: v1
kind: Service
metadata:
  name: clinic-ops-api
  namespace: clinic-ops
  labels:
    app: clinic-ops-api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: clinic-ops-api

---
apiVersion: v1
kind: Service
metadata:
  name: clinic-ops-api-nodeport
  namespace: clinic-ops
  labels:
    app: clinic-ops-api
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 8000
    nodePort: 30080
    protocol: TCP
    name: http
  selector:
    app: clinic-ops-api
