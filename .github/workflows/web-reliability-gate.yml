name: Web Reliability Gate

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web-reliability-gate.yml'
  pull_request:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web-reliability-gate.yml'
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      suite:
        description: 'TestSprite suite to execute'
        required: false
        default: 'payer-portal-nightly'
      requireGate:
        description: 'Fail workflow if TestSprite cannot run or does not pass'
        required: false
        type: boolean
        default: true

jobs:
  web-tests:
    name: Web Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run web test suite
        run: npm test -- --runInBand

  reliability-gate:
    name: TestSprite Reliability Gate
    runs-on: ubuntu-latest
    needs: web-tests
    defaults:
      run:
        working-directory: web
    env:
      TESTSPRITE_API_KEY: ${{ secrets.TESTSPRITE_API_KEY }}
      TESTSPRITE_BASE_URL: ${{ vars.TESTSPRITE_BASE_URL }}
      TESTSPRITE_SUITE: ${{ github.event_name == 'workflow_dispatch' && inputs.suite || vars.TESTSPRITE_SUITE || 'payer-portal-nightly' }}
      TESTSPRITE_MIN_PASS_RATE: ${{ vars.TESTSPRITE_MIN_PASS_RATE || '0.95' }}
      TESTSPRITE_TIMEOUT_MS: ${{ vars.TESTSPRITE_TIMEOUT_MS || '900000' }}
      TESTSPRITE_POLL_INTERVAL_MS: ${{ vars.TESTSPRITE_POLL_INTERVAL_MS || '15000' }}
      TESTSPRITE_GATE_REQUIRED: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.requireGate) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify TestSprite secret for enforced runs
        if: ${{ env.TESTSPRITE_GATE_REQUIRED == 'true' }}
        run: |
          if [ -z "$TESTSPRITE_API_KEY" ]; then
            echo "TESTSPRITE_API_KEY is required when TestSprite Reliability Gate is enforced."
            exit 1
          fi

      - name: Run TestSprite reliability gate
        run: npm run test:reliability
